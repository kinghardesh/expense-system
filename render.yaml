# Render Blueprint — provisions the web service + a PostgreSQL database.
# Deploy: push to GitHub, then in Render choose "New +" -> "Blueprint" and point
# it at this repo. HTTPS is provided automatically by Render.
services:
  - type: web
    name: school-expense-system
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn wsgi:app"
    envVars:
      - key: SECRET_KEY
        generateValue: true          # Render generates a strong random value
      - key: FLASK_CONFIG
        value: production            # enables Secure cookies
      - key: SESSION_COOKIE_SECURE
        value: "1"
      - key: ADMIN_USERNAME
        sync: false                  # set in the Render dashboard
      - key: ADMIN_PASSWORD_HASH
        sync: false                  # set a Werkzeug hash in the dashboard
      - key: DATABASE_URL
        fromDatabase:
          name: expense-db
          property: connectionString

