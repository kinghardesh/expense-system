{% extends 'base.html' %}
{% block title %}{{ title }}{% endblock %}

{% block content %}
<div class="d-flex flex-wrap justify-content-between align-items-center mb-3 gap-2">
    <div>
        <h1 class="h3 mb-0">{{ title }}</h1>
        <p class="text-muted small mb-0">Single-month expenditure</p>
    </div>
    {% include 'reports/_toolbar.html' %}
</div>

<form method="get" action="{{ url_for('reports.monthly') }}" class="row g-2 mb-3 align-items-end">
    <div class="col-auto">
        <label class="form-label small mb-1">Month</label>
        <select name="month" class="form-select form-select-sm">
            {% for m in range(1, 13) %}
            <option value="{{ m }}" {{ 'selected' if m == month }}>
                {{ ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][m-1] }}
            </option>
            {% endfor %}
        </select>
    </div>
    <div class="col-auto">
        <label class="form-label small mb-1">Year</label>
        <select name="year" class="form-select form-select-sm">
            {% for y in years %}<option value="{{ y }}" {{ 'selected' if y == year }}>{{ y }}</option>{% endfor %}
        </select>
    </div>
    <div class="col-auto"><button class="btn btn-sm btn-primary">Go</button></div>
</form>

{% include 'reports/_body.html' %}
{% endblock %}
