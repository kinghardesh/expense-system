{% extends 'base.html' %}
{% block title %}{{ title }}{% endblock %}

{% block content %}
<div class="d-flex flex-wrap justify-content-between align-items-center mb-3 gap-2">
    <div>
        <h1 class="h3 mb-0">{{ title }}</h1>
        <p class="text-muted small mb-0">Expenses over a date range</p>
    </div>
    {% include 'reports/_toolbar.html' %}
</div>

<form method="get" action="{{ url_for('reports.statement') }}" class="row g-2 mb-3 align-items-end">
    <div class="col-auto">
        <label class="form-label small mb-1">From</label>
        <input type="date" name="start" value="{{ filter.start or '' }}" class="form-control form-control-sm">
    </div>
    <div class="col-auto">
        <label class="form-label small mb-1">To</label>
        <input type="date" name="end" value="{{ filter.end or '' }}" class="form-control form-control-sm">
    </div>
    <div class="col-auto">
        <label class="form-label small mb-1">Category</label>
        <select name="category" class="form-select form-select-sm">
            <option value="">All</option>
            {% for c in categories %}<option value="{{ c }}" {{ 'selected' if filter.category == c }}>{{ c }}</option>{% endfor %}
        </select>
    </div>
    <div class="col-auto"><button class="btn btn-sm btn-primary">Go</button></div>
</form>

{% include 'reports/_body.html' %}
{% endblock %}
