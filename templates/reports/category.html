{% extends 'base.html' %}
{% block title %}{{ title }}{% endblock %}

{% block content %}
<div class="d-flex flex-wrap justify-content-between align-items-center mb-3 gap-2">
    <div>
        <h1 class="h3 mb-0">{{ title }}</h1>
        <p class="text-muted small mb-0">All expenses in a category</p>
    </div>
    {% include 'reports/_toolbar.html' %}
</div>

<form method="get" action="{{ url_for('reports.category') }}" class="row g-2 mb-3 align-items-end">
    <div class="col-auto">
        <label class="form-label small mb-1">Category</label>
        <select name="category" class="form-select form-select-sm">
            {% for c in categories %}<option value="{{ c }}" {{ 'selected' if c == selected }}>{{ c }}</option>{% endfor %}
        </select>
    </div>
    <div class="col-auto"><button class="btn btn-sm btn-primary">Go</button></div>
</form>

{% include 'reports/_body.html' %}
{% endblock %}
